# Configurazione del pannello di gestione (Sveltia CMS)
# -----------------------------------------------------
# TEST IN LOCALE: avvia "npx decap-server" in un terminale e apri
# http://localhost:8000/admin/  → il pannello si apre SENZA login
# e scrive direttamente su griglia.json e nella cartella Immagini/griglia.
#
# LIVE (login con account GitHub): serve un Cloudflare Worker gratuito
# (sveltia-cms-auth) che gestisce l'OAuth. Una volta deployato, incolla
# il suo indirizzo nel campo "base_url" qui sotto.

backend:
  name: github
  repo: eneainveee/Ristorante-23
  branch: main
  # URL del Cloudflare Worker (sveltia-cms-auth) che gestisce l'OAuth.
  # Necessario solo per il LIVE; in locale viene ignorato.
  base_url: https://sveltia-cms-auth.enea-inve.workers.dev

# Permette di lavorare in locale senza login
local_backend: true

# Lingua del pannello
locale: it

# Dove finiscono le foto caricate (cartella nel repo) e con quale percorso
# vengono lette dal sito.
media_folder: "Immagini/griglia"
public_folder: "/Immagini/griglia"

collections:
  - name: "griglia"
    label: "🔥 Griglia"
    description: "Gestisci la serata griglia mostrata in homepage."
    files:
      - name: "serata"
        label: "Serata griglia"
        file: "griglia.json"
        fields:
          - label: "Mostra la prossima grigliata?"
            name: "attiva"
            widget: "boolean"
            default: false
            hint: "Attiva quando c'è una grigliata in programma. Disattiva per nascondere del tutto il riquadro della griglia dal sito."
          - label: "Data della grigliata"
            name: "data"
            widget: "datetime"
            required: false
            format: "YYYY-MM-DD"
            date_format: "DD/MM/YYYY"
            time_format: false
            picker_utc: false
            hint: "Scegli il giorno dal calendario. Sul sito appare già scritto per esteso e tradotto da solo (es. «Sabato 5 luglio» · «Samstag, 5. Juli» · «Saturday, 5 July»). Lascia vuoto se non c'è ancora una data."
          - label: "Nota breve (facoltativa)"
            name: "nota"
            widget: "string"
            required: false
            hint: "Appare dopo la data, es. «su prenotazione» oppure «dalle 19». Lascia vuoto se non serve. Si vede uguale in tutte le lingue."
          - label: "Foto della grigliata"
            name: "foto"
            widget: "image"
            required: false
            hint: "Facoltativa. Verrà ottimizzata in automatico per non appesantire il sito."
